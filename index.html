<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Private Login</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    .login-layout {
      display: flex;
      align-items: stretch;
      min-height: 100vh;
      width: 100%;
    }

    .side-img {
      width: 30%;
      object-fit: cover;
    }

    .center-column {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* Responsive: Hide images on mobile and tablet */
    @media (max-width: 1024px) {
      .side-img {
        display: none;
      }
    }
  </style>
</head>

<body>

  <div class="login-layout">
    <img src="WhatsApp_Image_2026-02-25_at_2.28.24_AM-removebg-preview.png" class="side-img" alt="Left side">

    <div class="center-column">
      <div class="box">
        <h2>Private Login 🔐</h2>

        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>

        <div style="display: flex; gap: 10px; margin-top: 15px; justify-content: center;">
          <button onclick="loginUser()">Login</button>
          <a href="signup.html" style="text-decoration: none;">
            <button style="background: #25d366;">Go To Sign Up</button>
          </a>
        </div>
        <p id="error"></p>
      </div>
    </div>

    <img src="WhatsApp_Image_2026-02-25_at_2.28.24_AM-removebg-preview.png" class="side-img" alt="Right side">
  </div>

  <script src="login.js"></script>
</body>

</html>
